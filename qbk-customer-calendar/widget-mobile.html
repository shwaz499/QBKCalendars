<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QBK Events Calendar Mobile Widget</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260311-01" />
  </head>
  <body data-embed="1" data-force-mobile="1">
    <main class="layout">
      <section class="controls panel">
        <label class="field">
          Select Date
          <input id="event-date" type="date" />
        </label>
        <div class="date-nav">
          <button id="prev-day" class="nav-btn" type="button" aria-label="Previous day">&larr;</button>
          <button id="next-day" class="nav-btn" type="button" aria-label="Next day">&rarr;</button>
          <button
            id="mobile-filter-toggle"
            class="nav-btn mobile-filter-toggle"
            type="button"
            aria-expanded="false"
            aria-controls="filter-menu"
          >
            Filters ▾
          </button>
          <button id="today-day" class="nav-btn today-btn" type="button">Today</button>
        </div>
        <div class="filter-bar">
          <div class="filter-header">
            <span class="filter-title">Filters</span>
          </div>
          <div class="filter-menu" id="filter-menu">
            <button type="button" class="filter-chip filter-adult-classes is-active" data-filter-key="adultClasses">Adult Classes</button>
            <button type="button" class="filter-chip filter-adult-dropins is-active" data-filter-key="adultDropIns">Adult Drop-Ins</button>
            <button type="button" class="filter-chip filter-youth-classes is-active" data-filter-key="youthClasses">Youth Classes</button>
            <button type="button" class="filter-chip filter-teen-dropins is-active" data-filter-key="teenDropIns">Teen Drop Ins</button>
            <button type="button" class="filter-chip filter-leagues is-active" data-filter-key="leagues">Leagues</button>
            <button type="button" class="filter-chip filter-private-events is-active" data-filter-key="privateEventsRentals">Private Events & Rentals</button>
            <button type="button" class="filter-chip filter-available-rentals is-active" data-filter-key="availableRentals">Available Rentals</button>
            <div class="filter-menu-actions">
              <button id="clear-filters" class="nav-btn clear-filters-btn" type="button">Clear All</button>
            </div>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="results-header">
          <h2 id="day-view-title">Court Day View</h2>
        </div>
        <div class="day-grid-wrap">
          <div class="day-grid" id="day-grid">
            <div class="day-head time-head">Time</div>
            <div class="day-head">Left Court</div>
            <div class="day-head">Middle Court</div>
            <div class="day-head">Right Court</div>

            <div id="time-track" class="time-track"></div>
            <div id="court-left" class="court-track"></div>
            <div id="court-middle" class="court-track"></div>
            <div id="court-right" class="court-track"></div>
            <div id="vacancy-overlay" class="vacancy-overlay"></div>
            <div id="events-overlay" class="events-overlay"></div>
          </div>
        </div>
        <div class="mobile-day-view" id="mobile-day-view">
          <div class="mobile-court-tabs" id="mobile-court-tabs">
            <button class="mobile-court-tab is-active" type="button" data-court-key="left">Left Court</button>
            <button class="mobile-court-tab" type="button" data-court-key="middle">Middle Court</button>
            <button class="mobile-court-tab" type="button" data-court-key="right">Right Court</button>
          </div>
          <div class="mobile-events-list" id="mobile-events-list"></div>
        </div>
        <div class="rental-legend" aria-label="Rental time color key">
          <span class="rental-legend-title">Rental Key</span>
          <span class="rental-legend-item">
            <span class="rental-legend-swatch rental-legend-swatch--offpeak" aria-hidden="true"></span>
            Off-Peak
          </span>
          <span class="rental-legend-item">
            <span class="rental-legend-swatch rental-legend-swatch--peak" aria-hidden="true"></span>
            Peak
          </span>
        </div>
      </section>
    </main>

    <script src="./app.js?v=20260311-01"></script>
  </body>
</html>
